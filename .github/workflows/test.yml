name: Run Tests

on:
  push:
  pull_request:
    branches:
      - main  # Adjust this if your default branch is named differently

jobs:
  test:
    runs-on: ubuntu-latest  # Use the latest Ubuntu runner

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18  # Change to match your project's Node.js version
          cache: npm  # Caches dependencies for faster builds

      - name: Install dependencies
        run: npm ci  # Ensures a clean install using package-lock.json

      - name: Run tests
        run: npm test  # Runs your test script from package.json
